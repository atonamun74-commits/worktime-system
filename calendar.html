<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>月曆</title>

<style>

body{
font-family:-apple-system;
background:#f4f6fb;
margin:20px;
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#007aff;
color:white;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
height:60px;
text-align:center;
}

th{background:#eee;}

.work{background:#cce5ff;}
.holiday{color:red;font-weight:bold;}

.loading{
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<h2>上班月曆</h2>

<div class="header">
<button onclick="changeMonth(-1)">←</button>
<h3 id="title"></h3>
<button onclick="changeMonth(1)">→</button>
</div>

<div id="calendar" class="loading">載入中...</div>

<button onclick="back()">返回</button>

<script>

const API="https://script.google.com/macros/s/AKfycbzvjWpSMQI0GSTBgzEbPZZrdh9zJifa7-5pc4ox3e5k4KnMUxNIPsZqt7YRINUeEvoU/exec";

let password=localStorage.getItem("password");
let name=localStorage.getItem("name");

let current=new Date();
let data=[];

/* =========================
   📌 月份格式
========================= */
function formatMonth(date){
let y=date.getFullYear();
let m=(date.getMonth()+1).toString().padStart(2,"0");
return `${y}年${m}月`;
}

/* =========================
   📌 日期格式
========================= */
function formatDate(y,m,d){
return `${y}-${m}-${d.toString().padStart(2,"0")}`;
}

/* =========================
   📌 載入資料
========================= */
async function load(){

if(!password){
alert("請重新登入");
location.href="login.html";
return;
}

let month=formatMonth(current);

let url=`${API}?action=getMonth&month=${encodeURIComponent(month)}&password=${password}`;

let res=await fetch(url);

let resData;

try{
resData=await res.json();
}catch(e){
console.error("API錯誤");
document.getElementById("calendar").innerHTML="API錯誤";
return;
}

// API回傳錯誤
if(!resData.success){
alert(resData.msg || "API錯誤");
return;
}

// 正確資料
data = resData.data;

}

/* =========================
   📌 產生日曆
========================= */
async function generate(){

document.getElementById("calendar").innerHTML="載入中...";

await load();

if(!data || data.length===0){
document.getElementById("calendar").innerHTML="無資料";
return;
}

let y=current.getFullYear();
let m=current.getMonth()+1;

document.getElementById("title").innerText=formatMonth(current);

let first=new Date(y,m-1,1).getDay();
let days=new Date(y,m,0).getDate();

let html="<table>";

// 星期列
html+="<tr>";
["日","一","二","三","四","五","六"].forEach(d=>{
html+=`<th>${d}</th>`;
});
html+="</tr>";

let day=1;

for(let r=0;r<6;r++){

html+="<tr>";

for(let c=0;c<7;c++){

if(r===0 && c<first){
html+="<td></td>";
}
else if(day>days){
html+="<td></td>";
}
else{

let dateStr=formatDate(y,String(m).padStart(2,"0"),day);

// 找該日期資料
let row=data.find(x=>x.date===dateStr);

let cls="";
let text=day;

// 排班
if(row && row.shift==="Y"){
cls+=" work";
}

// 國定假日
if(row && row.holiday==="Y"){
cls+=" holiday";
}

html+=`<td class="${cls}">${text}</td>`;

day++;
}

}

html+="</tr>";

}

html+="</table>";

document.getElementById("calendar").innerHTML=html;

}

/* =========================
   📌 切換月份
========================= */
function changeMonth(n){
current.setMonth(current.getMonth()+n);
generate();
}

/* =========================
   📌 返回
========================= */
function back(){
location.href="index.html";
}

/* =========================
   🚀 啟動
========================= */
generate();

</script>

</body>
</html>
