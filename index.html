<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>工時打卡</title>

<style>
body{
font-family:-apple-system;
background:#f4f6fb;
margin:20px;
max-width:500px;
margin:auto;
}
.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}
button{
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
width:100%;
margin-top:10px;
}
button:disabled{
background:#ccc !important;
color:#666;
}
.in{background:#34c759;color:white;}
.out{background:#ff3b30;color:white;}
.menu{background:#007aff;color:white;}
.notice{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<h2>工時打卡</h2>

<div class="card">
<p>員工：<span id="user"></span></p>
<p id="shiftMsg" class="notice"></p>
<p id="holidayMsg" class="notice"></p>
</div>

<div class="card">
<p class="notice">平日7小時 / 假日8小時，加班另計</p>
</div>

<div class="card">
<button id="btnIn" class="in" onclick="clockIn()">上班打卡</button>
<button id="btnOut" class="out" onclick="clockOut()">下班打卡</button>
</div>

<div class="card">
<p>上班時間：<span id="startT">-</span></p>
<p>下班時間：<span id="endT">-</span></p>
<p>今日工時計算：<span id="calcH">0</span></p>
<p>實際工時：<span id="realH">0</span></p>
<p>今日薪資：<span id="todayPay">0</span></p>
</div>

<!-- 🔥 補回按鈕 -->
<div class="card">
<button class="menu" onclick="calendar()">月曆</button>
<button class="menu" onclick="record()">紀錄查詢</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzvjWpSMQI0GSTBgzEbPZZrdh9zJifa7-5pc4ox3e5k4KnMUxNIPsZqt7YRINUeEvoU/exec";
const RATE = 200;

let name=localStorage.getItem("name");
let password=localStorage.getItem("password");
let todayData=null;

if(!name || !password){
location.href="login.html";
}

document.getElementById("user").innerText=name;

/* 🔥 台灣時間（關鍵） */
function today(){
let d=new Date();
let y=d.getFullYear();
let m=String(d.getMonth()+1).padStart(2,"0");
let day=String(d.getDate()).padStart(2,"0");
return `${y}-${m}-${day}`;
}

function formatMonth(){
let d=new Date();
let y=d.getFullYear();
let m=String(d.getMonth()+1).padStart(2,"0");
return `${y}年${m}月`;
}

function calcHours(s,e){
let a=new Date("1970-01-01 "+s);
let b=new Date("1970-01-01 "+e);
return (b-a)/1000/60/60;
}

function getMaxHours(){
let d=new Date().getDay();
return (d===0||d===6)?8:7;
}

async function init(){

let url=`${API}?action=getMonth&month=${encodeURIComponent(formatMonth())}&password=${password}`;

let res=await fetch(url);
let text=await res.text();

let resData;

try{
resData=JSON.parse(text);
}catch(e){
alert("API錯誤");
console.log(text);
return;
}

let data=resData.data;

// 🔥 debug（很重要）
console.log("today:", today());
console.log("data sample:", data[0]);

todayData=data.find(x=>x.date===today());

// 🔥 如果抓不到 → 顯示原因
if(!todayData){
document.getElementById("shiftMsg").innerText="找不到今日資料（請確認日期格式）";
return;
}

// 排班
if(todayData.shift==="N"){
document.getElementById("shiftMsg").innerText="當日未排班";
}

// 假日
if(todayData.holiday==="Y"){
document.getElementById("holidayMsg").innerText="今日為國定假日";
}

// 顯示
if(todayData.start){

document.getElementById("startT").innerText=todayData.start;
document.getElementById("btnIn").disabled=true;

if(todayData.end){

document.getElementById("endT").innerText=todayData.end;

let real=calcHours(todayData.start,todayData.end);
let calc=Math.min(real,getMaxHours());

document.getElementById("calcH").innerText=calc.toFixed(2);
document.getElementById("realH").innerText=real.toFixed(2);
document.getElementById("todayPay").innerText=Math.round(calc*RATE);

document.getElementById("btnOut").disabled=true;

}

}

}

// 打卡功能（略，維持你原本）

function calendar(){
location.href="calendar.html";
}

function record(){
location.href="record.html";
}

init();

</script>

</body>
</html>
