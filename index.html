<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>工時打卡</title>

<style>
body{
font-family:-apple-system;
background:#f4f6fb;
margin:20px;
max-width:500px;
margin:auto;
}
.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}
button{
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
width:100%;
margin-top:10px;
}
button:disabled{
background:#ccc !important;
color:#666;
}
.in{background:#34c759;color:white;}
.out{background:#ff3b30;color:white;}
.menu{background:#007aff;color:white;}
.notice{
color:red;
font-weight:bold;
}
</style>

</head>

<body>

<h2>工時打卡</h2>

<div class="card">
<p>員工：<span id="user"></span></p>
<p id="shiftMsg" class="notice"></p>
<p id="holidayMsg" class="notice"></p>
</div>

<div class="card">
<p class="notice">
平日7小時 / 假日8小時，加班另計
</p>
</div>

<div class="card">
<button id="btnIn" class="in" onclick="clockIn()">上班打卡</button>
<button id="btnOut" class="out" onclick="clockOut()">下班打卡</button>
</div>

<div class="card">
<p>上班時間：<span id="startT">-</span></p>
<p>下班時間：<span id="endT">-</span></p>
<p>今日工時計算：<span id="calcH">0</span></p>
<p>實際工時：<span id="realH">0</span></p>
<p>今日薪資：<span id="todayPay">0</span></p>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwYJm-12JYPIu7MSvxvT4jIW34Revsa2g9FqJwnMlXd9e2fz5JrRdXnJ9vLTGOHB0TZ/exec";
const RATE = 200;

let name=localStorage.getItem("name");
let password=localStorage.getItem("password");
let todayData=null;

/* =========================
   🔥 登入檢查（不能用 return）
========================= */
if(!name || !password){
location.href="login.html";
}

/* ========================= */
document.getElementById("user").innerText=name;

/* =========================
   📌 日期
========================= */
function today(){
let d=new Date();
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function formatMonth(){
let d=new Date();
return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,"0")}月`;
}

function calcHours(s,e){
let a=new Date("1970-01-01 "+s);
let b=new Date("1970-01-01 "+e);
return (b-a)/1000/60/60;
}

function getMaxHours(){
let d=new Date().getDay();
return (d===0||d===6)?8:7;
}

/* =========================
   🔥 初始化（唯一 async）
========================= */
async function init(){

try{

let url=`${API}?action=getMonth&month=${encodeURIComponent(formatMonth())}&password=${password}`;

let res=await fetch(url);
let resData=await res.json();

if(!resData.success){
alert(resData.msg);
return;
}

let data=resData.data;

// 🔥 找今天
todayData=data.find(x=>x.date===today());

if(!todayData){
document.getElementById("shiftMsg").innerText="初始化中...";
return;
}

// 未排班
if(todayData.shift==="N"){
document.getElementById("shiftMsg").innerText="當日未排班";
}

// 假日
if(todayData.holiday==="Y"){
document.getElementById("holidayMsg").innerText="今日為國定假日";
}

// 顯示
if(todayData.start){

document.getElementById("startT").innerText=todayData.start;
document.getElementById("btnIn").disabled=true;

if(todayData.end){

document.getElementById("endT").innerText=todayData.end;

let real=calcHours(todayData.start,todayData.end);
let calc=Math.min(real,getMaxHours());

document.getElementById("calcH").innerText=calc.toFixed(2);
document.getElementById("realH").innerText=real.toFixed(2);
document.getElementById("todayPay").innerText=Math.round(calc*RATE);

document.getElementById("btnOut").disabled=true;

}

}

}catch(e){
console.error(e);
alert("系統錯誤");
}

}

/* =========================
   🟢 上班
========================= */
async function clockIn(){

if(todayData.shift==="N"){
alert("未排班");
return;
}

if(todayData.start){
alert("已打上班卡");
return;
}

let start=new Date().toTimeString().slice(0,5);

await fetch(API,{
method:"POST",
body:JSON.stringify({
password,date:today(),name,start,rate:RATE,type:"in"
})
});

location.reload();
}

/* =========================
   🔴 下班
========================= */
async function clockOut(){

if(!todayData.start){
alert("未上班");
return;
}

if(todayData.end){
alert("已下班");
return;
}

let end=new Date().toTimeString().slice(0,5);

let real=calcHours(todayData.start,end);
let calc=Math.min(real,getMaxHours());

await fetch(API,{
method:"POST",
body:JSON.stringify({
password,date:today(),name,
start:todayData.start,
end,
hours:calc,
rate:RATE,
salary:calc*RATE,
type:"out"
})
});

location.reload();
}

/* ========================= */
init();

</script>

</body>
</html>
