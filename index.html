<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>工時打卡</title>

<style>

body{
font-family:-apple-system;
background:#f4f6fb;
margin:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

button{
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
width:100%;
margin-top:10px;
}

button:disabled{
background:#ccc !important;
color:#666;
}

.in{background:#34c759;color:white;}
.out{background:#ff3b30;color:white;}
.menu{background:#007aff;color:white;}

.notice{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h2>工時打卡</h2>

<div class="card">
<p>員工：<span id="user"></span></p>
<p id="shiftMsg" class="notice"></p>
<p id="holidayMsg" class="notice"></p>
</div>

<div class="card">
<p class="notice">
平日上班為7小時，週末上班為8小時計算，加班費另計
</p>
</div>

<div class="card">
<button id="btnIn" class="in" onclick="clockIn()">上班打卡</button>
<button id="btnOut" class="out" onclick="clockOut()">下班打卡</button>
</div>

<div class="card">
<p>上班時間：<span id="startT">-</span></p>
<p>下班時間：<span id="endT">-</span></p>
<p>今日工時計算：<span id="calcH">0</span></p>
<p>實際工時：<span id="realH">0</span></p>
<p>今日薪資：<span id="todayPay">0</span></p>
</div>

<div class="card">
<button class="menu" onclick="calendar()">月曆</button>
<button class="menu" onclick="record()">紀錄查詢</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwYJm-12JYPIu7MSvxvT4jIW34Revsa2g9FqJwnMlXd9e2fz5JrRdXnJ9vLTGOHB0TZ/exec";
const RATE = 200;

let name=localStorage.getItem("name");
let password=localStorage.getItem("password");

let todayData=null;

if(!name){
location.href="login.html";
}

document.getElementById("user").innerText=name;

/* =========================
   📌 台灣日期（避免時區問題）
========================= */
function today(){
let d=new Date();
let y=d.getFullYear();
let m=(d.getMonth()+1).toString().padStart(2,"0");
let day=d.getDate().toString().padStart(2,"0");
return `${y}-${m}-${day}`;
}

function formatMonth(){
let d=new Date();
let y=d.getFullYear();
let m=(d.getMonth()+1).toString().padStart(2,"0");
return `${y}年${m}月`;
}

function calcHours(start,end){
let s=new Date("1970-01-01 "+start);
let e=new Date("1970-01-01 "+end);
return (e-s)/1000/60/60;
}

function getMaxHours(){
let d=new Date();
let day=d.getDay();
return (day===0||day===6)?8:7;
}

/* =========================
   🔥 初始化
========================= */
async function init(){

document.getElementById("shiftMsg").innerText="";
document.getElementById("holidayMsg").innerText="";

if(!password){
alert("請重新登入");
location.href="login.html";
return;
}

let url=`${API}?action=getMonth&month=${encodeURIComponent(formatMonth())}&password=${password}`;

// 第一次（觸發建立）
let res=await fetch(url);
let resData=await res.json();

if(!resData.success){
alert(resData.msg || "API錯誤");
return;
}

let data = resData.data;

// 若空 → 再抓一次
if(!data || data.length===0){
res=await fetch(url);
resData=await res.json();

if(!resData.success){
alert(resData.msg || "API錯誤");
return;
}

data = resData.data;
}

// 找今日
todayData = data.find(x=>x.date===today());

// 防呆
if(!todayData){
document.getElementById("shiftMsg").innerText="初始化資料中，請重新整理";
return;
}

// 未排班
if(todayData.shift==="N"){
document.getElementById("shiftMsg").innerText="當日未排班，請確認!!";
}

// 國定假日
if(todayData.holiday==="Y"){
document.getElementById("holidayMsg").innerText="今日為國定假日!!";
}

// 顯示資料
if(todayData.start){

document.getElementById("startT").innerText=todayData.start;
document.getElementById("endT").innerText=todayData.end || "-";

document.getElementById("btnIn").disabled=true;

if(todayData.end){

let realH=calcHours(todayData.start,todayData.end);
let calcH=Math.min(realH,getMaxHours());
let pay=calcH*RATE;

document.getElementById("calcH").innerText=calcH.toFixed(2)+" 小時";
document.getElementById("realH").innerText=realH.toFixed(2)+" 小時";
document.getElementById("todayPay").innerText=pay+" 元";

document.getElementById("btnOut").disabled=true;

}

}

}

/* =========================
   🟢 上班
========================= */
async function clockIn(){

if(todayData.shift==="N"){
alert("當日未排班，請確認!!");
return;
}

if(todayData.start){
alert("已經打過上班卡");
return;
}

let start=new Date().toTimeString().slice(0,5);

await fetch(API,{
method:"POST",
body:JSON.stringify({
password:password,
date:today(),
name:name,
start:start,
rate:RATE,
type:"in"
})
});

alert("上班打卡成功");
location.reload();
}

/* =========================
   🔴 下班
========================= */
async function clockOut(){

if(todayData.shift==="N"){
alert("當日未排班，請確認!!");
return;
}

if(!todayData.start){
alert("尚未打上班卡");
return;
}

if(todayData.end){
alert("已經打過下班卡");
return;
}

let end=new Date().toTimeString().slice(0,5);

let realH=calcHours(todayData.start,end);
let calcH=Math.min(realH,getMaxHours());
let pay=calcH*RATE;

await fetch(API,{
method:"POST",
body:JSON.stringify({
password:password,
date:today(),
name:name,
start:todayData.start,
end:end,
hours:calcH,
rate:RATE,
salary:pay,
type:"out"
})
});

alert("下班打卡成功");
location.reload();

}

function calendar(){
location.href="calendar.html";
}

function record(){
location.href="record.html";
}

init();

</script>

</body>
</html>
